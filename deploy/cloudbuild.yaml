steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/jarvis-backend', './backend']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jarvis-backend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jarvis-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/jarvis-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'LOG_LEVEL=INFO'
      - '--set-secrets'
      - 'GEMINI_API_KEY=jarvis-gemini-key:latest,GOOGLE_CLIENT_ID=jarvis-google-client-id:latest,GOOGLE_CLIENT_SECRET=jarvis-google-client-secret:latest,GOOGLE_REFRESH_TOKEN=jarvis-google-refresh-token:latest'

images:
  - 'gcr.io/$PROJECT_ID/jarvis-backend'
