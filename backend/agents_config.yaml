  - name: Agent Email Hypernova
    description: >-
      Asistente de correo electrónico para Hypernova Labs. Lee, busca, envía,
      responde, reenvía, elimina y organiza correos. Puede crear carpetas,
      mover correos, marcar como leído/no leído y abanderar. Gestión completa
      de buzón Outlook/Microsoft 365.
    agent_id: '6063611463870709760'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - correo
      - email
      - outlook
      - bandeja
      - mensaje
      - responder
      - redactar
      - mail
      - reenviar
      - carpeta
      - no leido
      - enviar correo
    routing_prompt: >-
      Usar para gestión avanzada de correo: buscar, filtrar, enviar, responder,
      organizar en carpetas, manejar correos no leídos. Para operaciones
      simples de email (leer últimos, enviar rápido) preferir las herramientas
      directas de Outlook de NOVA. Usar este agente para tareas complejas
      como filtros avanzados, organización masiva o redacción elaborada.
    enabled: true
