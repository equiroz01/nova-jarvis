  - name: Global KYC Agent
    description: >-
      Agente router de KYC global. Dirige solicitudes al sub-agente apropiado
      según el país de origen: uk_kyc_agent para empresas UK (Companies House)
      o usa_kyc_agent para empresas US (SEC/EDGAR, insider trading).
    agent_id: '2830315003465170944'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - kyc
      - verificacion
      - identidad
      - compliance
      - companies house
      - sec
      - edgar
      - insider trading
      - uk
      - usa
      - due diligence
      - empresa
    routing_prompt: >-
      Usar para verificaciones KYC de empresas en UK (Companies House) o
      USA (SEC/EDGAR). El agente rutea al sub-agente correcto según el país.
      NO usar para KYC de personas físicas, países fuera de UK/USA, ni para
      análisis financiero profundo.
    enabled: true

  - name: Invoice Processing
    description: >-
      Asistente de procesamiento de facturas con dos modos: Inference (pipeline
      completo de clasificación, extracción, validación y transformación) y
      Learning (revisión de casos con SMEs y gestión de reglas ALF para mejorar
      el procesamiento automático).
    agent_id: '5303917098798415872'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - factura
      - invoice
      - procesamiento
      - alf
      - clasificacion
      - extraccion
      - validacion
      - pipeline
      - reglas
      - caso
    routing_prompt: >-
      Usar para procesar facturas (pipeline completo o parcial), revisar
      casos de facturación, crear o modificar reglas ALF, o consultas sobre
      el framework de procesamiento. NO usar para contabilidad general,
      impuestos, ni temas financieros fuera del procesamiento de facturas.
    enabled: true

  - name: Agent Pricing Hypernova
    description: >-
      Copiloto de precios y promociones para supermercados de Panamá (Riba Smith,
      Super 99, Super Xtra, El Machetazo). Compara precios entre supermercados,
      analiza márgenes y rentabilidad, sugiere estrategias de pricing y
      promociones, y busca precios complementarios en la web.
    agent_id: '4211857960835481600'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - precio
      - pricing
      - tarifa
      - supermercado
      - comparacion
      - margen
      - promocion
      - riba smith
      - super 99
      - machetazo
      - cotizacion
      - descuento
      - competencia precios
    routing_prompt: >-
      Usar para comparar precios entre supermercados panameños, analizar márgenes,
      sugerir promociones o estrategias de pricing de productos retail.
      NO usar para cambiar precios directamente, gestionar inventario,
      ni para pricing de servicios tech/SaaS.
    enabled: true

  - name: Agent GitHub Hypernova
    description: >-
      Agente de visibilidad de proyectos GitHub para Hypernova Labs. Analiza
      actividad de repositorios, contribución de desarrolladores, estado de PRs
      e issues, salud de ramas, y genera reportes ejecutivos. Solo lectura —
      no puede modificar nada en GitHub.
    agent_id: '1411744892517875712'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - github
      - repositorio
      - commits
      - pull request
      - issues
      - codigo
      - proyecto
      - desarrollo
      - reporte
      - actividad
      - ramas
      - contribuidores
    routing_prompt: >-
      Usar para reportes ejecutivos de actividad en GitHub, análisis de
      contribuidores, estado de PRs/issues y salud de proyectos.
      NO usar para modificar repos (crear PRs, cerrar issues) — para eso
      usar MCP de GitHub. NO usar para consultas fuera de GitHub.
    enabled: true

