# Vertex AI Agents — registered agents that NOVA can delegate to.
# type: reasoning_engine (Vertex AI Agent Engine) or dialogflow_cx (legacy)
# Discovery run: 2026-06-09
agents:
  - name: Agent Eval Hypernova
    description: >-
      Agente de evaluación estratégica que analiza empresas usando información
      pública para identificar oportunidades de IA y soluciones agentic.
      Perfila industria, madurez digital, puntos de dolor, riesgos y
      oportunidades de agentes conversacionales por área de negocio.
    agent_id: '5570823546441039872'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - evaluacion
      - empresas
      - estrategia
      - competencia
      - due diligence
      - analisis
      - mercado
      - madurez digital
      - oportunidades ia
      - perfil consultivo
      - agentes conversacionales
      - puntos de dolor
    routing_prompt: >-
      Usar cuando el usuario quiera evaluar una empresa, analizar su madurez
      digital, identificar oportunidades de IA o soluciones agentic, o generar
      un perfil consultivo. NO usar para información financiera privada,
      dictámenes legales, ni preguntas fuera del análisis estratégico empresarial.
    enabled: true

