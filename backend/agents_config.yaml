      Agente de re-venta y gestión de boletos para FIFA World Cup 2026.
      Pendiente nuevo deploy.
    agent_id: '7134753492626833408'
    type: reasoning_engine
    project_id: hypernovalabs-sa
    location: us-central1
    specialties:
      - boletos
      - tickets
      - mundial
      - fifa
      - wc26
      - world cup
      - partidos
      - estadio
    routing_prompt: >-
      Usar para consultas sobre boletos del Mundial 2026. Pendiente nuevo deploy.
