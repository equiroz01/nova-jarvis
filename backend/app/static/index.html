<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N.O.V.A.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>

<div class="app">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div>
        <div class="logo">N.O.V.A.</div>
        <div class="logo-sub">NEURAL OPERATIVE VOICE ASSISTANT</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-pill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">CONNECTING</span>
      </div>
      <div class="session-id" id="sessionId">--</div>
      <button class="theme-toggle" id="ttsToggle" title="Toggle voice">
        <svg id="ttsIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <a href="/settings" class="theme-toggle" title="Settings" style="text-decoration:none">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </a>
      <div class="clock" id="clock">00:00:00</div>
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="arc-reactor" id="arcReactor"></div>
      <p>Type or use voice to interact</p>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <span class="msg-label">N.O.V.A.</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Hands-Free Fullscreen HUD -->
  <div class="hf-hud" id="hfHud" data-state="listening">
    <button class="hf-close">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="arc-reactor" id="hfReactor"></div>
    <div class="hf-hud-status" id="hfHudStatus">LISTENING</div>
    <div class="hf-hud-transcript" id="hfHudTranscript"></div>
    <div class="hf-hud-response" id="hfHudResponse"></div>
  </div>

  <!-- Speaking overlay -->
  <div class="speaking-overlay" id="speakingOverlay">
    <div class="arc-reactor arc-reactor-sm arc-speaking" id="speakReactor"></div>
    <span class="speaking-label">SPEAKING</span>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-tabs">
      <button class="input-tab active" data-mode="text">TEXT</button>
      <button class="input-tab" data-mode="voice">VOICE</button>
      <button class="input-tab" data-mode="handsfree">HANDS-FREE</button>
    </div>

    <div class="voice-bar hidden" id="voiceBar">
      <span class="voice-status" id="voiceStatus">PRESS TO SPEAK</span>
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <div class="waveform" id="waveform"></div>
    </div>

    <div class="voice-bar hidden" id="handsfreeBar">
      <button class="mic-btn" id="hfToggleBtn">
        <div class="hf-ring" id="hfRing"></div>
        <svg class="hf-mic-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <span class="voice-status" id="hfStatus">PRESS TO ACTIVATE</span>
      <div class="waveform" id="hfWaveform"></div>
    </div>

    <div class="text-input-row" id="textBar">
      <textarea class="text-input" id="textInput" placeholder="Type a command..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
