<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N.O.V.A.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#04070d;
  --bg-panel:#0a1020;
  --bg-card:rgba(10,22,50,0.6);
  --cyan:#00e5ff;
  --cyan-dim:rgba(0,229,255,0.15);
  --cyan-glow:0 0 20px rgba(0,229,255,0.3);
  --amber:#ffab00;
  --amber-dim:rgba(255,171,0,0.12);
  --amber-glow:0 0 20px rgba(255,171,0,0.3);
  --red:#ff1744;
  --green:#00e676;
  --text-primary:#e0f0ff;
  --text-secondary:#5a7a9a;
  --text-muted:#2a3a50;
  --border:rgba(0,229,255,0.08);
  --radius:4px;
  --scanline-color:rgba(0,229,255,0.008);
  --grid-line:rgba(0,229,255,0.015);
  --grid-glow1:rgba(0,229,255,0.04);
  --grid-glow2:rgba(255,171,0,0.02);
  --topbar-bg:rgba(4,7,13,0.9);
  --input-bg:rgba(4,7,13,0.95);
  --corner-color:rgba(0,229,255,0.12);
}
[data-theme="light"]{
  --bg-deep:#f0f2f5;
  --bg-panel:#ffffff;
  --bg-card:rgba(0,50,120,0.04);
  --cyan:#0077b6;
  --cyan-dim:rgba(0,119,182,0.08);
  --cyan-glow:0 0 12px rgba(0,119,182,0.15);
  --amber:#d97706;
  --amber-dim:rgba(217,119,6,0.06);
  --amber-glow:0 0 12px rgba(217,119,6,0.15);
  --red:#dc2626;
  --green:#16a34a;
  --text-primary:#1a2030;
  --text-secondary:#5a6a80;
  --text-muted:#a0aab8;
  --border:rgba(0,50,120,0.08);
  --scanline-color:transparent;
  --grid-line:rgba(0,50,120,0.03);
  --grid-glow1:rgba(0,119,182,0.02);
  --grid-glow2:rgba(217,119,6,0.01);
  --topbar-bg:rgba(255,255,255,0.92);
  --input-bg:rgba(255,255,255,0.96);
  --corner-color:rgba(0,119,182,0.1);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:'Rajdhani',sans-serif;
  font-weight:400;
  letter-spacing:0.02em;
}

/* ── Scanline overlay ── */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline-color) 2px,var(--scanline-color) 4px);
}

/* ── Grid background ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,var(--grid-glow1),transparent),
    radial-gradient(ellipse 60% 40% at 20% 100%,var(--grid-glow2),transparent),
    linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,60px 60px,60px 60px;
}

/* ── Layout ── */
.app{
  display:grid;
  grid-template-rows:auto 1fr auto;
  height:100vh;
  position:relative;z-index:1;
}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
  background:var(--topbar-bg);
  backdrop-filter:blur(20px);
}
.topbar-left{display:flex;align-items:center;gap:16px}
.logo{
  font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:18px;letter-spacing:6px;
  background:linear-gradient(135deg,var(--cyan),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--text-secondary);letter-spacing:3px;
}
.topbar-right{display:flex;align-items:center;gap:20px}
.status-pill{
  display:flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:var(--text-secondary);
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--text-muted);
  transition:background 0.3s,box-shadow 0.3s;
}
.status-dot.online{background:var(--green);box-shadow:0 0 8px rgba(0,230,118,0.5)}
.status-dot.offline{background:var(--red);box-shadow:0 0 8px rgba(255,23,68,0.5)}
.session-id{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:var(--text-muted);letter-spacing:1px;
}
.clock{
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:var(--text-secondary);min-width:70px;text-align:right;
}

/* ── Chat Area ── */
.chat-container{
  overflow-y:auto;padding:24px 20px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}
.chat-container::-webkit-scrollbar{width:3px}
.chat-container::-webkit-scrollbar-track{background:transparent}
.chat-container::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:2px}

/* Message groups */
.msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.msg-group.user{align-items:flex-end}
.msg-group.jarvis{align-items:flex-start}

.msg-label{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:2px;padding:0 4px;
}
.msg-group.user .msg-label{color:var(--amber)}
.msg-group.jarvis .msg-label{color:var(--cyan)}

.msg-time{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--text-muted);padding:0 4px;margin-top:1px;
}

.msg{
  max-width:65%;padding:10px 16px;
  font-size:15px;line-height:1.55;letter-spacing:0.01em;
  border-radius:var(--radius);position:relative;
  animation:msgIn 0.35s cubic-bezier(0.16,1,0.3,1);
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(12px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.msg.user-msg{
  background:linear-gradient(135deg,var(--amber-dim),transparent);
  border:1px solid var(--amber-dim);
  border-radius:var(--radius) var(--radius) 2px var(--radius);
  color:var(--text-primary);
}
.msg.jarvis-msg{
  background:linear-gradient(135deg,var(--cyan-dim),transparent);
  border:1px solid var(--cyan-dim);
  border-radius:var(--radius) var(--radius) var(--radius) 2px;
  color:var(--text-primary);
}

/* Typing indicator */
.typing-indicator{
  display:none;align-items:flex-start;gap:2px;margin-bottom:8px;
  flex-direction:column;
}
.typing-indicator.active{display:flex}
.typing-dots{
  display:flex;gap:4px;padding:12px 18px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) var(--radius) 2px;
}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--cyan);opacity:0.3;
  animation:dotPulse 1.4s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{
  0%,60%,100%{opacity:0.2;transform:scale(0.8)}
  30%{opacity:1;transform:scale(1.1)}
}

/* Welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:20px;
}
.welcome p{
  font-size:13px;color:var(--text-muted);
  font-family:'Share Tech Mono',monospace;letter-spacing:1px;
}

/* ── Arc Reactor SVG ── */
.arc-reactor{
  width:240px;height:240px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.arc-reactor svg.reactor-svg{
  width:100%;height:100%;
  filter:drop-shadow(0 0 30px rgba(0,170,255,0.4)) drop-shadow(0 0 60px rgba(0,100,200,0.2));
}
.arc-reactor-sm{width:50px;height:50px}
.arc-reactor-sm svg.reactor-svg{filter:drop-shadow(0 0 8px rgba(0,170,255,0.5))}

/* SVG animation classes — rotate around center of 240x240 viewBox */
svg.reactor-svg .ring-outer,
svg.reactor-svg .ring-gears,
svg.reactor-svg .ring-mid,
svg.reactor-svg .ring-bars,
svg.reactor-svg .ring-sweep{transform-origin:120px 120px}
.ring-outer{animation:svgSpin 20s linear infinite}
.ring-gears{animation:svgSpin 15s linear infinite}
.ring-mid{animation:svgSpin 10s linear infinite reverse}
.ring-bars{animation:svgSpin 8s linear infinite}
.ring-sweep{animation:svgSpin 3s linear infinite}
.core-glow{animation:coreBreath 3s ease-in-out infinite}

@keyframes svgSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes coreBreath{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}

/* Core text overlay */
.arc-core{
  position:absolute;z-index:2;
  font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:18px;letter-spacing:4px;
  color:#fff;
  text-shadow:0 0 10px rgba(0,180,255,0.8),0 0 25px rgba(0,140,255,0.4),0 0 50px rgba(0,100,200,0.2);
  animation:txtPulse 3s ease-in-out infinite;
}
.arc-core-sm{font-size:8px;letter-spacing:1px}
@keyframes txtPulse{
  0%,100%{opacity:0.85}
  50%{opacity:1;text-shadow:0 0 15px rgba(0,200,255,1),0 0 35px rgba(0,150,255,0.6),0 0 60px rgba(0,100,200,0.3)}
}

/* Speaking state */
/* (transform-origin already set above) */
.arc-speaking .ring-outer{animation-duration:3s}
.arc-speaking .ring-gears{animation-duration:2s}
.arc-speaking .ring-bars{animation-duration:1.5s}
.arc-speaking .ring-sweep{animation-duration:0.8s}
.arc-speaking .core-glow{animation:coreBreath 0.6s ease-in-out infinite}
.arc-speaking svg.reactor-svg{filter:drop-shadow(0 0 40px rgba(0,200,255,0.6)) drop-shadow(0 0 80px rgba(0,100,200,0.3))}

/* ── Bottom Input ── */
.input-area{
  padding:16px 20px 20px;
  border-top:1px solid var(--border);
  background:var(--input-bg);
  backdrop-filter:blur(20px);
}

/* Voice Bar */
.voice-bar{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin-bottom:12px;
  height:48px;
}
.voice-bar.hidden{display:none}

.mic-btn{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--cyan-dim);
  background:rgba(0,229,255,0.04);
  cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}
.mic-btn svg{width:20px;height:20px;stroke:var(--cyan);transition:stroke 0.3s}
.mic-btn:hover{
  border-color:rgba(0,229,255,0.4);
  background:rgba(0,229,255,0.08);
  box-shadow:var(--cyan-glow);
}
.mic-btn.recording{
  border-color:var(--red);background:rgba(255,23,68,0.1);
  animation:recPulse 1.5s ease-in-out infinite;
}
.mic-btn.recording svg{stroke:var(--red)}
@keyframes recPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,23,68,0.2)}
  50%{box-shadow:0 0 0 14px rgba(255,23,68,0)}
}
.mic-btn.processing{
  border-color:var(--amber);background:rgba(255,171,0,0.06);
  animation:procSpin 2s linear infinite;
}
.mic-btn.processing svg{stroke:var(--amber)}
@keyframes procSpin{
  from{border-color:rgba(255,171,0,0.4)}
  to{border-color:rgba(255,171,0,0.1)}
}

.voice-status{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:var(--text-muted);letter-spacing:2px;
  min-width:140px;
}
.voice-status.recording{color:var(--red)}
.voice-status.processing{color:var(--amber)}

/* Waveform */
.waveform{
  display:flex;align-items:center;gap:2px;height:32px;
  opacity:0;transition:opacity 0.3s;
}
.waveform.active{opacity:1}
.waveform-bar{
  width:2px;height:4px;background:var(--cyan);border-radius:1px;
  transition:height 0.1s;
}

/* Text Input */
.text-input-row{
  display:flex;gap:8px;align-items:flex-end;
}
.text-input{
  flex:1;padding:10px 14px;
  background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text-primary);font-family:'Rajdhani',sans-serif;
  font-size:15px;letter-spacing:0.02em;
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  transition:border-color 0.3s;
}
.text-input::placeholder{color:var(--text-muted)}
.text-input:focus{border-color:rgba(0,229,255,0.25)}

.send-btn{
  width:42px;height:42px;border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg-card);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;flex-shrink:0;
}
.send-btn svg{width:18px;height:18px;stroke:var(--text-secondary);transition:stroke 0.3s}
.send-btn:hover{border-color:rgba(0,229,255,0.3);background:rgba(0,229,255,0.05)}
.send-btn:hover svg{stroke:var(--cyan)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Input mode tabs */
.input-tabs{
  display:flex;gap:0;margin-bottom:8px;
}
.input-tab{
  padding:4px 14px;
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);background:transparent;
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.3s;
}
.input-tab:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.input-tab:last-child{border-radius:0 var(--radius) var(--radius) 0}
.input-tab+.input-tab{border-left:none}
.input-tab.active{
  color:var(--cyan);border-color:rgba(0,229,255,0.2);
  background:rgba(0,229,255,0.05);
}

/* ── Hands-Free Fullscreen HUD ── */
.hf-hud{
  display:none;position:fixed;inset:0;z-index:50;
  background:var(--bg-deep);
  flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}
.hf-hud.active{display:flex}

.hf-hud .arc-reactor{width:320px;height:320px;transition:all 0.5s}

/* HUD status label */
.hf-hud-status{
  font-family:'Share Tech Mono',monospace;font-size:12px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--text-muted);margin-top:30px;
  transition:color 0.3s;
}

/* HUD transcript (what you said) */
.hf-hud-transcript{
  font-family:'Rajdhani',sans-serif;font-size:16px;
  color:var(--text-secondary);margin-top:12px;
  max-width:500px;text-align:center;
  min-height:24px;
  opacity:0.7;
}

/* HUD response (what NOVA says) */
.hf-hud-response{
  font-family:'Rajdhani',sans-serif;font-size:15px;
  color:var(--text-primary);margin-top:8px;
  max-width:600px;text-align:center;
  min-height:20px;
  padding:0 20px;
}

/* Close button */
.hf-close{
  position:absolute;top:16px;right:16px;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;z-index:51;
}
.hf-close svg{width:16px;height:16px;stroke:var(--text-secondary)}
.hf-close:hover{border-color:var(--red);background:rgba(255,23,68,0.1)}
.hf-close:hover svg{stroke:var(--red)}

/* HUD State: listening (default cyan) */
.hf-hud[data-state="listening"] .hf-hud-status{color:#0af}

/* Speech — green, faster */
.hf-hud[data-state="speech"] svg.reactor-svg{filter:drop-shadow(0 0 40px rgba(0,230,118,0.5)) drop-shadow(0 0 80px rgba(0,180,100,0.2))}
.hf-hud[data-state="speech"] svg.reactor-svg circle,
.hf-hud[data-state="speech"] svg.reactor-svg line,
.hf-hud[data-state="speech"] svg.reactor-svg rect{stroke:#0e6}
.hf-hud[data-state="speech"] .ring-gears{animation-duration:4s}
.hf-hud[data-state="speech"] .ring-bars{animation-duration:3s}
.hf-hud[data-state="speech"] .ring-sweep{animation-duration:1.5s}
.hf-hud[data-state="speech"] .core-glow{animation:coreBreath 1s ease-in-out infinite}
.hf-hud[data-state="speech"] .arc-core{color:#0e6;text-shadow:0 0 15px rgba(0,230,118,0.8),0 0 30px rgba(0,180,100,0.4)}
.hf-hud[data-state="speech"] .hf-hud-status{color:var(--green)}

/* Processing — amber, fast */
.hf-hud[data-state="processing"] svg.reactor-svg{filter:drop-shadow(0 0 40px rgba(255,171,0,0.5)) drop-shadow(0 0 80px rgba(200,130,0,0.2))}
.hf-hud[data-state="processing"] svg.reactor-svg circle,
.hf-hud[data-state="processing"] svg.reactor-svg line,
.hf-hud[data-state="processing"] svg.reactor-svg rect{stroke:#fa0}
.hf-hud[data-state="processing"] .ring-gears{animation-duration:2s}
.hf-hud[data-state="processing"] .ring-bars{animation-duration:1.5s}
.hf-hud[data-state="processing"] .ring-sweep{animation-duration:1s}
.hf-hud[data-state="processing"] .core-glow{animation:coreBreath 0.5s ease-in-out infinite}
.hf-hud[data-state="processing"] .arc-core{color:#fa0;text-shadow:0 0 15px rgba(255,171,0,0.8),0 0 30px rgba(200,130,0,0.4)}
.hf-hud[data-state="processing"] .hf-hud-status{color:var(--amber)}

/* Speaking — bright cyan max */
.hf-hud[data-state="speaking"] svg.reactor-svg{filter:drop-shadow(0 0 50px rgba(0,200,255,0.7)) drop-shadow(0 0 100px rgba(0,150,255,0.3))}
.hf-hud[data-state="speaking"] .ring-outer{animation-duration:3s}
.hf-hud[data-state="speaking"] .ring-gears{animation-duration:1.5s}
.hf-hud[data-state="speaking"] .ring-bars{animation-duration:1s}
.hf-hud[data-state="speaking"] .ring-sweep{animation-duration:0.6s}
.hf-hud[data-state="speaking"] .core-glow{animation:coreBreath 0.4s ease-in-out infinite}
.hf-hud[data-state="speaking"] .arc-core{text-shadow:0 0 20px rgba(0,200,255,1),0 0 40px rgba(0,150,255,0.6),0 0 70px rgba(0,100,200,0.3)}
.hf-hud[data-state="speaking"] .hf-hud-status{color:#2cf}

/* Speaking animation overlay */
.speaking-overlay{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:12px;
  padding:10px 22px 10px 14px;border-radius:30px;
  background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);
  backdrop-filter:blur(10px);
  z-index:10;
}
.speaking-overlay.active{display:flex}
.speaking-label{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  color:var(--cyan);letter-spacing:2px;
}

/* Corner decorations */
/* Rendered markdown in messages */
.msg-content{line-height:1.6}
.msg-content p{margin:0 0 8px}
.msg-content p:last-child{margin-bottom:0}
.msg-content strong{color:var(--cyan);font-weight:600}
.msg-content em{opacity:0.85}
.msg-content ul,.msg-content ol{margin:6px 0 6px 18px;padding:0}
.msg-content li{margin-bottom:4px}
.msg-content li::marker{color:var(--cyan)}
.msg-content code{
  font-family:'Share Tech Mono',monospace;font-size:13px;
  background:rgba(0,229,255,0.06);border:1px solid var(--border);
  padding:1px 5px;border-radius:3px;
}
.msg-content pre{
  background:rgba(0,0,0,0.2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;margin:6px 0;
  overflow-x:auto;
}
.msg-content pre code{background:none;border:none;padding:0}
.msg-content a{color:var(--cyan);text-decoration:underline;text-underline-offset:2px}
.msg-content h1,.msg-content h2,.msg-content h3{
  font-family:'Orbitron',sans-serif;font-weight:500;
  letter-spacing:1px;margin:10px 0 6px;font-size:13px;
  color:var(--cyan);text-transform:uppercase;
}
.msg-content hr{
  border:none;border-top:1px solid var(--border);margin:8px 0;
}
.msg-content blockquote{
  border-left:2px solid var(--cyan-dim);
  padding-left:10px;margin:6px 0;opacity:0.8;
}

/* Hands-free indicator */
.hf-indicator{
  width:48px;height:48px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.hf-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--cyan-dim);
  transition:all 0.3s;
}
.hf-ring.listening{
  border-color:var(--cyan);
  animation:hfPulse 2s ease-in-out infinite;
}
.hf-ring.speech{

<script>
const API = window.location.origin;
const sessionId = 'web-' + crypto.randomUUID().slice(0, 8);
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let inputMode = 'text';
let currentAudio = null;
let isFirstMessage = true;

// ── TTS Toggle ──
let ttsEnabled = localStorage.getItem('jarvis-tts') !== 'off';
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem('jarvis-tts', ttsEnabled ? 'on' : 'off');
  if (!ttsEnabled) window.speechSynthesis.cancel();
  updateTTSIcon();
}
function updateTTSIcon() {
  const el = document.getElementById('ttsIcon');
  el.style.opacity = ttsEnabled ? '1' : '0.3';
}
updateTTSIcon();
// Preload voices (some browsers need this)
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ── Theme ──
const SUN_SVG = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) { html.removeAttribute('data-theme'); } else { html.setAttribute('data-theme', 'light'); }
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('jarvis-theme', next);
  setThemeIcon(next);
}
function setThemeIcon(theme) {
  const el = document.getElementById('themeIcon');
  while (el.firstChild) el.removeChild(el.firstChild);
  const temp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const parser = new DOMParser();
  const svg = parser.parseFromString('<svg xmlns="http://www.w3.org/2000/svg">' + (theme === 'light' ? MOON_SVG : SUN_SVG) + '</svg>', 'image/svg+xml');
  Array.from(svg.documentElement.childNodes).forEach(n => el.appendChild(document.importNode(n, true)));
}
(function initTheme() {
  const saved = localStorage.getItem('jarvis-theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  setThemeIcon(saved);
})();

// ── Init ──
document.getElementById('sessionId').textContent = sessionId.toUpperCase();
initWaveform();
initArcTicks();
startClock();
checkHealth();
setInterval(checkHealth, 15000);

// ── Clock ──
function startClock() {
  const el = document.getElementById('clock');
  function tick() {
    const d = new Date();
    el.textContent = d.toTimeString().slice(0, 8);
  }
  tick(); setInterval(tick, 1000);
}

// ── Health Check ──
async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(API + '/health', { signal: AbortSignal.timeout(5000) });
    if (r.ok) { dot.className = 'status-dot online'; txt.textContent = 'CONNECTED'; }
    else throw 0;
  } catch {
    dot.className = 'status-dot offline'; txt.textContent = 'OFFLINE';
  }
}

// ── Input Mode ──
function setInputMode(mode) {
  // Stop previous mode
  if (inputMode === 'handsfree') stopHandsfree();
  if (inputMode === 'voice' && isRecording) stopRecording();

  inputMode = mode;
  document.querySelectorAll('.input-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('voiceBar').classList.toggle('hidden', mode !== 'voice');
  document.getElementById('handsfreeBar').classList.toggle('hidden', mode !== 'handsfree');
  document.getElementById('textBar').style.display = mode === 'text' ? 'flex' : 'none';
  if (mode === 'text') document.getElementById('textInput').focus();
}

// ── Text Send ──
function handleTextKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  autoResize(e.target);
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendText() {
  const input = document.getElementById('textInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = ''; input.style.height = 'auto';
  hideWelcome();
  addMessage(msg, 'user');

  // PARALLEL: Fire filler + LLM at the same time
  const fillerText = speakFiller(msg);
  const streamBubble = addStreamMessage();
  updateStreamMessage(streamBubble, fillerText);

  try {
    // LLM stream starts (filler already playing)
    const r = await fetch(API + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: sessionId })
    });

    const reader = r.body.pipeThrough(new TextDecoderStream()).getReader();
    let fullResponse = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += value;
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          // Skip backend filler (we already fired our own)
          if (data.type === 'filler') continue;

          // Real response tokens — replace filler with actual content
          if (data.type === 'token') {
            fullResponse += data.content;
            updateStreamMessage(streamBubble, fullResponse);
          }

          if (data.type === 'done') {
            fullResponse = data.response;
            updateStreamMessage(streamBubble, fullResponse);

            // Stop filler audio, play real response with Salome
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            fetch(API + '/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: fullResponse })
            }).then(r => r.json()).then(ttsData => {
              if (ttsData.audio_base64) playAudio(ttsData.audio_base64);
            }).catch(() => {});
          }

          if (data.type === 'error') {
            updateStreamMessage(streamBubble, data.detail);
          }
        } catch (e) { /* skip malformed lines */ }
      }
    }
  } catch (e) {
    hideTyping();
    addMessage('Connection error. Backend may be offline.', 'jarvis');
  }
}

// ── Voice Recording (WAV via Web Audio API) ──
let audioContext = null;
let audioStream = null;
let audioSource = null;
let analyserNode = null;
let scriptProcessor = null;
let recordedSamples = [];

async function toggleRecording() {
  if (isRecording) { stopRecording(); return; }
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    audioContext = new AudioContext({ sampleRate: 16000 });
    audioSource = audioContext.createMediaStreamSource(audioStream);

    // Analyser for live waveform
    analyserNode = audioContext.createAnalyser();
    analyserNode.fftSize = 64;
    audioSource.connect(analyserNode);

    // ScriptProcessor to capture raw PCM samples
    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
    recordedSamples = [];
    scriptProcessor.onaudioprocess = (e) => {
      const data = e.inputBuffer.getChannelData(0);
      recordedSamples.push(new Float32Array(data));
    };
    audioSource.connect(scriptProcessor);
    scriptProcessor.connect(audioContext.destination);

    isRecording = true;
    updateMicState('recording');
    startLiveWaveform();
  } catch (e) {
    console.error('Mic error:', e);
    addMessage('Microphone access denied. Please allow mic access in your browser.', 'jarvis');
  }
}

function stopRecording() {
  isRecording = false;
  updateMicState('processing');
  stopLiveWaveform();

  // Stop audio processing
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (audioSource) { audioSource.disconnect(); audioSource = null; }
  if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
  if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }

  // Convert recorded samples to WAV
  const wavBlob = samplesToWav(recordedSamples, audioContext ? audioContext.sampleRate : 16000);
  if (audioContext) { audioContext.close(); audioContext = null; }
  recordedSamples = [];

  sendVoice(wavBlob);
}

function samplesToWav(chunks, sampleRate) {
  // Merge all chunks into one Float32Array
  let totalLength = 0;
  for (const c of chunks) totalLength += c.length;
  const merged = new Float32Array(totalLength);
  let offset = 0;
  for (const c of chunks) { merged.set(c, offset); offset += c.length; }

  // Convert float32 to int16
  const int16 = new Int16Array(merged.length);
  for (let i = 0; i < merged.length; i++) {
    const s = Math.max(-1, Math.min(1, merged[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  // Build WAV file
  const buffer = new ArrayBuffer(44 + int16.length * 2);
  const view = new DataView(buffer);
  function writeStr(off, str) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + int16.length * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);       // PCM
  view.setUint16(22, 1, true);       // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);      // 16-bit
  writeStr(36, 'data');
  view.setUint32(40, int16.length * 2, true);
  const int16View = new Int16Array(buffer, 44);
  int16View.set(int16);

  return new Blob([buffer], { type: 'audio/wav' });
}

async function sendVoice(blob) {
  hideWelcome();

  // PARALLEL: filler plays while /voice processes
  speakFiller('general');

  const form = new FormData();
  form.append('audio', blob, 'recording.wav');
  form.append('session_id', sessionId);

  try {
    const r = await fetch(API + '/voice', { method: 'POST', body: form });
    const data = await r.json();
    // Stop filler
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (data.transcript) addMessage(data.transcript, 'user');
    if (data.response) addMessage(data.response, 'jarvis');
    if (data.audio_base64) playAudio(data.audio_base64);
    updateMicState('idle');
  } catch (e) {
    hideTyping();
    addMessage('Voice processing failed. Check backend.', 'jarvis');
    updateMicState('idle');
  }
}

function updateMicState(state) {
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('voiceStatus');
  btn.className = 'mic-btn';
  status.className = 'voice-status';
  if (state === 'recording') {
    btn.classList.add('recording'); status.classList.add('recording');
    status.textContent = 'RECORDING...';
  } else if (state === 'processing') {
    btn.classList.add('processing'); status.classList.add('processing');
    status.textContent = 'PROCESSING...';
  } else {
    status.textContent = 'PRESS TO SPEAK';
  }
}

// ── Audio Playback ──
function playAudio(b64) {
  const overlay = document.getElementById('speakingOverlay');
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  const blob = new Blob([arr], { type: 'audio/mp3' });
  const url = URL.createObjectURL(blob);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  overlay.classList.add('active');
  currentAudio.onended = () => { overlay.classList.remove('active'); URL.revokeObjectURL(url); };
  currentAudio.onerror = () => overlay.classList.remove('active');
  currentAudio.play();
}

// ── Filler Phrases (muletillas) — client-side for ALL modes ──
const FILLER_BANK = {
  general: [
    "Un momento...", "Déjeme ver...", "Ya le digo, jefe...", "Permítame...",
    "Ehh, un segundo...", "Ya va...", "Déjeme pensar...", "A ver...",
    "Mmm, ya le respondo...", "Un segundito...", "Uy, buena pregunta...",
    "Ya le cuento...", "Listo, déjeme ver...", "Voy a revisar eso...",
    "Ay, ya voy...", "Qué maravilla, ya le digo...", "Espéreme un momentico...",
    "Ya casi, un segundo...", "Aja, déjeme mirar...", "Listo, ya voy por eso...",
  ],
  search: [
    "Estoy buscando en internet...", "Déjeme buscar eso...", "Ya reviso, un segundo...",
    "Consultando fuentes...", "Buscando información...", "Déjeme revisar en la web...",
    "Ya lo busco...", "Chequeando en internet...", "Ay, ya voy, déjeme buscar...",
    "Listo, ya estoy buscando...", "Uy, déjeme mirar eso...", "Ya le averiguo...",
  ],
  news: [
    "Revisando las noticias...", "Déjeme ver qué hay de nuevo...",
    "Buscando las últimas noticias...", "Revisando los titulares...",
    "A ver qué pasó hoy...", "Consultando las noticias...",
    "Uy, déjeme ver qué hay...", "Ya miro qué está pasando...",
    "Voy a revisar las novedades...", "Qué maravilla, ya le cuento qué hay...",
  ],
  memory: [
    "Déjeme revisar mis notas...", "Un momento, reviso lo que sé...",
    "Verificando en mi memoria...", "Déjeme buscar en mis registros...",
    "Ya reviso lo que tengo guardado...", "A ver, déjeme recordar...",
    "Un segundito, ya miro...", "Uy, eso lo tengo por aquí...",
  ],
  time: ["Ya verifico...", "Un segundo...", "Déjeme checar...", "Ya miro la hora..."],
  weather: ["Revisando el clima...", "Déjeme ver el pronóstico...", "Consultando el tiempo...", "Ya miro cómo está el clima..."],
};

const _recentFillers = [];
function pickFiller(msg) {
  const lower = (msg || '').toLowerCase();
  let cat = 'general';
  if (/noticias|news|novedades|titulares|pasó|actualidad/.test(lower)) cat = 'news';
  else if (/busca|search|google|internet|encuentra|averigua/.test(lower)) cat = 'search';
  else if (/recuerdas|sabes|conoces|quien|quién|memoria/.test(lower)) cat = 'memory';
  else if (/hora|time|reloj/.test(lower)) cat = 'time';
  else if (/clima|weather|pronóstico|temperatura|lluvia/.test(lower)) cat = 'weather';

  const bank = FILLER_BANK[cat] || FILLER_BANK.general;
  const available = bank.filter(f => !_recentFillers.includes(f));
  const pick = available.length ? available[Math.floor(Math.random() * available.length)] : bank[Math.floor(Math.random() * bank.length)];
  _recentFillers.push(pick);
  if (_recentFillers.length > 5) _recentFillers.shift();
  return pick;
}

// Pre-cache the greeting audio at page load so it's instant
let _greetingAudioB64 = null;

(function preloadGreeting() {

  }).then(r => r.json()).then(data => {

function speakFiller(queryHint) {
  // First message of the session → greeting (pre-cached audio)
  if (isFirstMessage) {
    isFirstMessage = false;
    const greeting = _greetingText || _getGreeting();
    if (_greetingAudioB64) {
      playAudio(_greetingAudioB64);
    } else {
      // Fallback: request TTS on the fly
      fetch(API + '/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: greeting })
      }).then(r => r.json()).then(d => { if (d.audio_base64) playAudio(d.audio_base64); }).catch(() => {});
    }
    return greeting;
  }

  // Detect type from hint
  const lower = (queryHint || '').toLowerCase();
  let qtype = 'general';
  if (/noticias|news|novedades|titulares/.test(lower)) qtype = 'news';
  else if (/busca|search|internet/.test(lower)) qtype = 'search';
  else if (/recuerdas|sabes|conoces|memoria/.test(lower)) qtype = 'memory';
  else if (/hora|time/.test(lower)) qtype = 'time';
  else if (/clima|weather/.test(lower)) qtype = 'weather';

  // Request pre-cached filler audio from backend (instant)
  const filler = pickFiller(queryHint);
  fetch(API + '/filler', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query_type: qtype })
  }).then(r => r.json()).then(data => {
    if (data.audio_base64) playAudio(data.audio_base64);
  }).catch(() => {});

  return filler;
}

// ── Browser TTS (SpeechSynthesis) ──
function speakText(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  // Strip markdown for cleaner speech
  const clean = text
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/\[(.+?)\]\(.+?\)/g, '$1')
    .replace(/^#{1,3}\s+/gm, '')
    .replace(/^[-*+]\s+/gm, '')
    .replace(/^\d+[.)]\s+/gm, '')
    .replace(/\n+/g, '. ')
    .trim();

  const overlay = document.getElementById('speakingOverlay');
  const utterance = new SpeechSynthesisUtterance(clean);

  // Detect language
  const spanishPattern = /[áéíóúñ¿¡]|hola|noticias|aquí|tienes|puedes/i;
  utterance.lang = spanishPattern.test(clean) ? 'es-ES' : 'en-US';
  utterance.rate = 1.05;
  utterance.pitch = 1.0;

  // Try to pick a good voice
  const voices = window.speechSynthesis.getVoices();
  const langPrefix = utterance.lang.slice(0, 2);
  const preferred = voices.find(v => v.lang.startsWith(langPrefix) && v.name.toLowerCase().includes('male'))
    || voices.find(v => v.lang.startsWith(langPrefix))
    || voices[0];
  if (preferred) utterance.voice = preferred;

  utterance.onstart = () => overlay.classList.add('active');
  utterance.onend = () => overlay.classList.remove('active');
  utterance.onerror = () => overlay.classList.remove('active');

  window.speechSynthesis.speak(utterance);
}

// ── Hands-Free Mode (VAD: Voice Activity Detection) ──
let hfStream = null;
let hfContext = null;
let hfAnalyser = null;
let hfSource = null;
let hfProcessor = null;
let hfSamples = [];
let hfActive = false;
let hfState = 'idle'; // idle, listening, speech, processing
let hfSilenceStart = 0;
let hfSpeechDetected = false;
let hfRAF = null;
let hfMuted = false; // true while Jarvis is speaking to prevent self-listening

const VAD_SILENCE_MS = 1500;       // ms of silence to stop recording
const VAD_MIN_SPEECH_MS = 300;     // minimum speech duration to send
const VAD_RESUME_DELAY_MS = 800;   // delay after Jarvis stops speaking before listening
const VAD_MARGIN = 15;             // dB above noise floor to detect speech
const VAD_CALIBRATION_MS = 2000;   // time to measure ambient noise at start
const VAD_MIN_THRESHOLD = 20;      // absolute minimum threshold
let hfSpeechStart = 0;
let hfNoiseFloor = 20;             // adaptive noise floor (updated continuously)
let hfCalibrating = false;

function toggleHandsfree() {
  if (hfActive) {
    closeHfHud();
  } else {
    document.getElementById('hfHud').classList.add('active');
    document.getElementById('hfHudTranscript').textContent = '';
    document.getElementById('hfHudResponse').textContent = '';
    startHandsfree();
  }
}

function closeHfHud() {
  stopHandsfree();
  document.getElementById('hfHud').classList.remove('active');
  setInputMode('text');
}

async function startHandsfree() {
  if (hfActive) return;
  try {
    hfStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    hfContext = new AudioContext({ sampleRate: 16000 });
    hfSource = hfContext.createMediaStreamSource(hfStream);

    hfAnalyser = hfContext.createAnalyser();
    hfAnalyser.fftSize = 512;
    hfSource.connect(hfAnalyser);

    // Processor to capture audio
    hfProcessor = hfContext.createScriptProcessor(4096, 1, 1);
    hfProcessor.onaudioprocess = (e) => {
      if (hfSpeechDetected) {
        hfSamples.push(new Float32Array(e.inputBuffer.getChannelData(0)));
      }
    };
    hfSource.connect(hfProcessor);
    hfProcessor.connect(hfContext.destination);

    hfActive = true;
    hfSamples = [];
    hfSpeechDetected = false;
    initHfWaveform();

    // Calibrate noise floor before listening
    hfCalibrating = true;
    setHfState('listening');
    const hudS = document.getElementById('hfHudStatus');
    if (hudS) hudS.textContent = 'CALIBRATING...';
    calibrateNoiseFloor(() => {
      hfCalibrating = false;
      setHfState('listening');
      hfVADLoop();
    });
  } catch (e) {
    console.error('Hands-free mic error:', e);
    addMessage('Microphone access denied. Allow mic access for hands-free mode.', 'jarvis');
    setInputMode('text');
  }
}

let _interruptRAF = null;
const INTERRUPT_MARGIN = 25; // Must be louder than normal speech to interrupt (above noise floor)

function hfMute() {
  hfMuted = true;
  cancelAnimationFrame(hfRAF);
  // Disconnect processor (stop recording) but keep analyser for interrupt detection
  if (hfProcessor && hfSource) {
    try { hfSource.disconnect(hfProcessor); } catch(e) {}
  }
}

function hfUnmute() {
  hfMuted = false;
  hfSamples = [];
  hfSpeechDetected = false;
  hfSilenceStart = 0;
  cancelAnimationFrame(_interruptRAF);
  // Reconnect processor
  if (hfProcessor && hfSource) {
    try { hfSource.connect(hfProcessor); } catch(e) {}
  }
}

function startInterruptMonitor() {
  // Monitor mic levels while N.O.V.A. speaks — if user talks loud, interrupt
  if (!hfAnalyser || !hfActive) return;
  function check() {
    if (!hfActive || hfState !== 'speaking') return;
    const data = new Uint8Array(hfAnalyser.frequencyBinCount);
    hfAnalyser.getByteFrequencyData(data);
    const level = data.reduce((a, b) => a + b, 0) / data.length;

    if (level > hfNoiseFloor + INTERRUPT_MARGIN) {
      // User is speaking — interrupt N.O.V.A.!
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      window.speechSynthesis.cancel();
      document.getElementById('speakingOverlay').classList.remove('active');

      // Reconnect processor and start recording the interruption
      hfUnmute();
      hfSpeechDetected = true;
      hfSpeechStart = Date.now();
      hfSamples = [];
      setHfState('speech');
      hfVADLoop();
      return; // Stop monitoring
    }
    _interruptRAF = requestAnimationFrame(check);
  }
  check();
}

function stopHandsfree() {
  hfActive = false;
  cancelAnimationFrame(hfRAF);
  if (hfProcessor) { hfProcessor.disconnect(); hfProcessor = null; }
  if (hfSource) { hfSource.disconnect(); hfSource = null; }
  if (hfAnalyser) { hfAnalyser.disconnect(); hfAnalyser = null; }
  if (hfStream) { hfStream.getTracks().forEach(t => t.stop()); hfStream = null; }
  if (hfContext) { hfContext.close(); hfContext = null; }
  hfSamples = [];
  hfSpeechDetected = false;
  setHfState('idle');
}

function calibrateNoiseFloor(callback) {
  if (!hfAnalyser) { callback(); return; }
  const samples = [];
  const start = Date.now();
  function measure() {
    if (Date.now() - start > VAD_CALIBRATION_MS) {
      // Calculate average noise level
      if (samples.length > 0) {
        const avg = samples.reduce((a, b) => a + b, 0) / samples.length;
        hfNoiseFloor = Math.max(VAD_MIN_THRESHOLD, avg);
      }
      console.log('Noise floor calibrated:', hfNoiseFloor.toFixed(1), '| Threshold:', (hfNoiseFloor + VAD_MARGIN).toFixed(1));
      callback();
      return;
    }
    const data = new Uint8Array(hfAnalyser.frequencyBinCount);
    hfAnalyser.getByteFrequencyData(data);
    const level = data.reduce((a, b) => a + b, 0) / data.length;
    samples.push(level);
    requestAnimationFrame(measure);
  }
  measure();
}

// Slowly adapt noise floor during listening (handles music starting/stopping)
function updateNoiseFloor(level) {
  if (hfState === 'listening' && !hfSpeechDetected) {
    // Smooth adaptation: 95% old + 5% new
    hfNoiseFloor = hfNoiseFloor * 0.95 + level * 0.05;
    hfNoiseFloor = Math.max(VAD_MIN_THRESHOLD, hfNoiseFloor);
  }
}

function hfVADLoop() {
  if (!hfActive || !hfAnalyser || hfMuted) return;

  const data = new Uint8Array(hfAnalyser.frequencyBinCount);
  hfAnalyser.getByteFrequencyData(data);
  const level = data.reduce((a, b) => a + b, 0) / data.length;

  // Adaptive noise floor
  const threshold = hfNoiseFloor + VAD_MARGIN;
  updateNoiseFloor(level);

  // Update waveform
  const bars = document.getElementById('hfWaveform').querySelectorAll('.waveform-bar');
  if (bars.length) {
    const subset = new Uint8Array(hfAnalyser.frequencyBinCount);
    hfAnalyser.getByteFrequencyData(subset);
    bars.forEach((b, i) => {
      b.style.height = Math.max(4, (subset[i] || 0) / 255 * 28) + 'px';
    });
  }

  const now = Date.now();

  if (hfState === 'listening') {
    if (level > threshold) {
      // Speech detected above noise floor!
      hfSpeechDetected = true;
      hfSpeechStart = now;
      hfSamples = [];
      setHfState('speech');
    }
  } else if (hfState === 'speech') {
    if (level > threshold) {
      hfSilenceStart = 0; // reset silence timer
    } else {
      if (hfSilenceStart === 0) hfSilenceStart = now;
      if (now - hfSilenceStart > VAD_SILENCE_MS) {
        // Silence long enough — send if we have enough speech
        if (now - hfSpeechStart > VAD_MIN_SPEECH_MS) {
          hfSendAudio();
        } else {
          // Too short, ignore and go back to listening
          hfSamples = [];
          hfSpeechDetected = false;
          hfSilenceStart = 0;
          setHfState('listening');
        }
        return; // stop loop, will restart after response
      }
    }
  }

  hfRAF = requestAnimationFrame(hfVADLoop);
}

async function hfSendAudio() {
  setHfState('processing');
  hfSpeechDetected = false;
  hfSilenceStart = 0;
  hfMute();

  // PARALLEL: filler plays while /voice processes
  const filler = speakFiller('general');
  const hudR = document.getElementById('hfHudResponse');
  if (hudR) hudR.textContent = filler;

  const wavBlob = samplesToWav(hfSamples, hfContext ? hfContext.sampleRate : 16000);
  hfSamples = [];
  hideWelcome();

  const form = new FormData();
  form.append('audio', wavBlob, 'recording.wav');
  form.append('session_id', sessionId);

  try {
    const r = await fetch(API + '/voice', { method: 'POST', body: form });
    const data = await r.json();

    // Stop filler
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    if (!data.transcript && !data.response) {
      // No speech
    } else {
      const hudT = document.getElementById('hfHudTranscript');
      if (data.transcript) {
        addMessage(data.transcript, 'user');
        if (hudT) hudT.textContent = '"' + data.transcript + '"';
      }
      if (data.response) {
        addMessage(data.response, 'jarvis');
        if (hudR) hudR.textContent = data.response.replace(/\*\*/g,'').substring(0, 200);
      }

      setHfState('speaking');
      startInterruptMonitor(); // Listen for user interruptions while speaking

      if (data.audio_base64) {
        await playAudioAsync(data.audio_base64);
      } else if (data.response) {
        await speakTextAsync(data.response);
      }
    }
  } catch (e) {
    console.error('Voice error:', e);
  }

  // Resume listening (only if not already interrupted)
  cancelAnimationFrame(_interruptRAF);
  if (hfActive && inputMode === 'handsfree' && hfState !== 'speech') {
    await new Promise(r => setTimeout(r, VAD_RESUME_DELAY_MS));
    hfUnmute();
    setHfState('listening');
    hfVADLoop();
  }
}

// Async versions that resolve when audio finishes
function playAudioAsync(b64) {
  return new Promise(resolve => {
    const overlay = document.getElementById('speakingOverlay');
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const blob = new Blob([arr], { type: 'audio/mp3' });
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    overlay.classList.add('active');
    currentAudio.onended = () => { overlay.classList.remove('active'); URL.revokeObjectURL(url); resolve(); };
    currentAudio.onerror = () => { overlay.classList.remove('active'); resolve(); };
    currentAudio.play();
  });
}

function speakTextAsync(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return Promise.resolve();
  return new Promise(resolve => {
    window.speechSynthesis.cancel();
    const clean = text.replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1')
      .replace(/`(.+?)`/g,'$1').replace(/\[(.+?)\]\(.+?\)/g,'$1')
      .replace(/^#{1,3}\s+/gm,'').replace(/^[-*+]\s+/gm,'')
      .replace(/^\d+[.)]\s+/gm,'').replace(/\n+/g,'. ').trim();
    const overlay = document.getElementById('speakingOverlay');
    const utterance = new SpeechSynthesisUtterance(clean);
    const spanishPattern = /[áéíóúñ¿¡]|hola|noticias|aquí|tienes|puedes/i;
    utterance.lang = spanishPattern.test(clean) ? 'es-ES' : 'en-US';
    utterance.rate = 1.05;
    const voices = window.speechSynthesis.getVoices();
    const langPrefix = utterance.lang.slice(0,2);
    const preferred = voices.find(v => v.lang.startsWith(langPrefix)) || voices[0];
    if (preferred) utterance.voice = preferred;
    utterance.onstart = () => overlay.classList.add('active');
    utterance.onend = () => { overlay.classList.remove('active'); resolve(); };
    utterance.onerror = () => { overlay.classList.remove('active'); resolve(); };
    window.speechSynthesis.speak(utterance);
  });
}

function setHfState(state) {

    if (hud) { hud.setAttribute('data-state', 'listening'); }

    if (hud) { hud.setAttribute('data-state', 'speech'); }

    if (hud) { hud.setAttribute('data-state', 'processing'); }

// ── Markdown Renderer (safe DOM-based, no innerHTML) ──
function renderMarkdown(text) {
  const container = document.createElement('div');
  container.className = 'msg-content';
  const lines = text.split('\n');
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    if (line.trim() === '') { i++; continue; }

    const headingMatch = line.match(/^(#{1,3})\s+(.+)/);
    if (headingMatch) {
      const h = document.createElement('h' + headingMatch[1].length);
      appendInline(h, headingMatch[2]);
      container.appendChild(h); i++; continue;
    }
    if (/^[-*_]{3,}\s*$/.test(line.trim())) {
      container.appendChild(document.createElement('hr')); i++; continue;
    }
    if (/^\s*[-*+]\s/.test(line)) {
      const ul = document.createElement('ul');
      while (i < lines.length && /^\s*[-*+]\s/.test(lines[i])) {
        const li = document.createElement('li');
        appendInline(li, lines[i].replace(/^\s*[-*+]\s+/, ''));
        ul.appendChild(li); i++;
      }
      container.appendChild(ul); continue;
    }
    if (/^\s*\d+[.)]\s/.test(line)) {
      const ol = document.createElement('ol');
      while (i < lines.length && /^\s*\d+[.)]\s/.test(lines[i])) {
        const li = document.createElement('li');
        appendInline(li, lines[i].replace(/^\s*\d+[.)]\s+/, ''));
        ol.appendChild(li); i++;
      }
      container.appendChild(ol); continue;
    }
    if (line.trim().startsWith('```')) {
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      i++; const codeLines = [];
      while (i < lines.length && !lines[i].trim().startsWith('```')) { codeLines.push(lines[i]); i++; }
      code.textContent = codeLines.join('\n');
      pre.appendChild(code); container.appendChild(pre); i++; continue;
    }
    if (line.trim().startsWith('>')) {
      const bq = document.createElement('blockquote');
      const p = document.createElement('p');
      appendInline(p, line.replace(/^>\s*/, ''));
      bq.appendChild(p); container.appendChild(bq); i++; continue;
    }
    const p = document.createElement('p');
    appendInline(p, line);
    container.appendChild(p); i++;
  }
  return container;
}

function appendInline(el, text) {
  const pattern = /(\*\*(.+?)\*\*)|(\*(.+?)\*)|(`(.+?)`)|(\[(.+?)\]\((.+?)\))/g;
  let lastIdx = 0, m;
  while ((m = pattern.exec(text)) !== null) {
    if (m.index > lastIdx) el.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
    if (m[1]) { const s = document.createElement('strong'); s.textContent = m[2]; el.appendChild(s); }
    else if (m[3]) { const em = document.createElement('em'); em.textContent = m[4]; el.appendChild(em); }
    else if (m[5]) { const c = document.createElement('code'); c.textContent = m[6]; el.appendChild(c); }
    else if (m[7]) { const a = document.createElement('a'); a.textContent = m[8]; a.href = m[9]; a.target = '_blank'; a.rel = 'noopener'; el.appendChild(a); }
    lastIdx = pattern.lastIndex;
  }
  if (lastIdx < text.length) el.appendChild(document.createTextNode(text.slice(lastIdx)));
}

// ── Messages ──
function addMessage(text, who) {
  const container = document.getElementById('chatContainer');
  const group = document.createElement('div');
  group.className = 'msg-group ' + who;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = who === 'user' ? 'YOU' : 'N.O.V.A.';

  const bubble = document.createElement('div');
  bubble.className = 'msg ' + (who === 'user' ? 'user-msg' : 'jarvis-msg');
  if (who === 'jarvis') {
    bubble.appendChild(renderMarkdown(text));
  } else {
    bubble.textContent = text;
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  group.appendChild(label);
  group.appendChild(bubble);
  group.appendChild(time);

  // Insert before typing indicator
  const typing = document.getElementById('typingIndicator');
  container.insertBefore(group, typing);
  container.scrollTop = container.scrollHeight;
}

function addStreamMessage() {
  const container = document.getElementById('chatContainer');
  const group = document.createElement('div');
  group.className = 'msg-group jarvis';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'N.O.V.A.';

  const bubble = document.createElement('div');
  bubble.className = 'msg jarvis-msg';
  bubble.id = 'stream-bubble';

  const time_el = document.createElement('div');
  time_el.className = 'msg-time';
  time_el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  group.appendChild(label);
  group.appendChild(bubble);
  group.appendChild(time_el);

  const typing = document.getElementById('typingIndicator');
  container.insertBefore(group, typing);
  return bubble;
}

function updateStreamMessage(bubble, text) {
  if (!bubble) return;
  // Clear and re-render markdown
  while (bubble.firstChild) bubble.removeChild(bubble.firstChild);
  bubble.appendChild(renderMarkdown(text));
  const container = document.getElementById('chatContainer');
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  document.getElementById('typingIndicator').classList.add('active');
  document.getElementById('chatContainer').scrollTop =
    document.getElementById('chatContainer').scrollHeight;
}
function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('active');
}
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
}

// ── Waveform (live from mic analyser) ──
function buildReactorSVG(showLabel) {
  const c = 120; // center
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 240 240');
  svg.setAttribute('class', 'reactor-svg');

  // Defs: glow filter
  const defs = document.createElementNS(ns, 'defs');
  const filter = document.createElementNS(ns, 'filter');
  filter.id = 'glow'; filter.setAttribute('x','-50%'); filter.setAttribute('y','-50%');
  filter.setAttribute('width','200%'); filter.setAttribute('height','200%');
  const blur = document.createElementNS(ns, 'feGaussianBlur'); blur.setAttribute('stdDeviation','4'); blur.setAttribute('result','g');
  const merge = document.createElementNS(ns, 'feMerge');
  const m1 = document.createElementNS(ns, 'feMergeNode'); m1.setAttribute('in','g');
  const m2 = document.createElementNS(ns, 'feMergeNode'); m2.setAttribute('in','SourceGraphic');
  merge.append(m1, m2); filter.append(blur, merge); defs.append(filter);

  // Radial gradient for core
  const grad = document.createElementNS(ns, 'radialGradient'); grad.id = 'coreGrad';
  [{o:0,c:'rgba(200,240,255,0.95)'},{o:0.3,c:'rgba(0,180,255,0.8)'},{o:0.6,c:'rgba(0,120,255,0.4)'},{o:1,c:'rgba(0,60,180,0)'}]
    .forEach(s => { const st = document.createElementNS(ns,'stop'); st.setAttribute('offset',s.o); st.setAttribute('stop-color',s.c); grad.append(st); });
  defs.append(grad);
  svg.append(defs);

  function circle(r, sw, cls, dash) {
    const el = document.createElementNS(ns, 'circle');
    el.setAttribute('cx', c); el.setAttribute('cy', c); el.setAttribute('r', r);
    el.setAttribute('fill', 'none'); el.setAttribute('stroke', '#0af');
    el.setAttribute('stroke-width', sw); el.setAttribute('filter', 'url(#glow)');
    if (cls) el.setAttribute('class', cls);
    if (dash) el.setAttribute('stroke-dasharray', dash);
    el.setAttribute('opacity', '0.7');
    return el;
  }

  // Ring 1: Outer dashed ring
  svg.append(circle(112, 2.5, 'ring-outer', '8 4'));

  // Gear segments (12 trapezoids on outer ring)
  const gearG = document.createElementNS(ns, 'g');
  gearG.setAttribute('class', 'ring-gears');
  for (let i = 0; i < 12; i++) {
    const rect = document.createElementNS(ns, 'rect');
    const angle = i * 30;
    rect.setAttribute('x', c - 7); rect.setAttribute('y', 3);
    rect.setAttribute('width', 14); rect.setAttribute('height', 10);
    rect.setAttribute('rx', 1);
    rect.setAttribute('fill', 'rgba(0,170,255,0.15)');
    rect.setAttribute('stroke', '#0af'); rect.setAttribute('stroke-width', 0.8);
    rect.setAttribute('transform', 'rotate(' + angle + ' ' + c + ' ' + c + ')');
    rect.setAttribute('filter', 'url(#glow)');
    gearG.append(rect);
  }
  svg.append(gearG);

  // Ring 2: Mid ring (solid bright)
  svg.append(circle(95, 2, 'ring-mid'));

  // Radial bars (24 lines of varying length)
  const barG = document.createElementNS(ns, 'g');
  barG.setAttribute('class', 'ring-bars');
  for (let i = 0; i < 24; i++) {
    const line = document.createElementNS(ns, 'line');
    const angle = i * 15;
    const len = (i % 3 === 0) ? 20 : (i % 2 === 0) ? 14 : 9;
    const r1 = 75; const r2 = r1 + len;
    const rad = angle * Math.PI / 180;
    line.setAttribute('x1', c + r1 * Math.sin(rad)); line.setAttribute('y1', c - r1 * Math.cos(rad));
    line.setAttribute('x2', c + r2 * Math.sin(rad)); line.setAttribute('y2', c - r2 * Math.cos(rad));
    line.setAttribute('stroke', '#0af'); line.setAttribute('stroke-width', (i % 3 === 0) ? 3 : 2);
    line.setAttribute('opacity', (i % 3 === 0) ? '0.8' : '0.4');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('filter', 'url(#glow)');
    barG.append(line);
  }
  svg.append(barG);

  // Ring 3: Inner ring
  svg.append(circle(70, 1.5, '', ''));

  // Ring 4: Core ring (bright)
  const coreRing = circle(52, 2, '');
  coreRing.setAttribute('opacity', '0.9');
  svg.append(coreRing);

  // Core glow circle
  const core = document.createElementNS(ns, 'circle');
  core.setAttribute('cx', c); core.setAttribute('cy', c); core.setAttribute('r', 42);
  core.setAttribute('fill', 'url(#coreGrad)');
  core.setAttribute('class', 'core-glow');
  svg.append(core);

  // Sweep line
  const sweepG = document.createElementNS(ns, 'g');
  sweepG.setAttribute('class', 'ring-sweep');
  const sweepLine = document.createElementNS(ns, 'line');
  sweepLine.setAttribute('x1', c); sweepLine.setAttribute('y1', c);
  sweepLine.setAttribute('x2', c + 105); sweepLine.setAttribute('y2', c);
  sweepLine.setAttribute('stroke', 'rgba(0,200,255,0.6)');
  sweepLine.setAttribute('stroke-width', 1.5);
  sweepLine.setAttribute('filter', 'url(#glow)');
  sweepG.append(sweepLine);
  svg.append(sweepG);

  return svg;
}

function initArcTicks() {
  // Build SVG reactors
  document.querySelectorAll('.arc-reactor').forEach(container => {
    if (container.querySelector('.reactor-svg')) return;
    const svg = buildReactorSVG(true);
    container.insertBefore(svg, container.firstChild);
    // Add core label
    if (!container.querySelector('.arc-core')) {
      const label = document.createElement('div');
      label.className = 'arc-core' + (container.classList.contains('arc-reactor-sm') ? ' arc-core-sm' : '');
      label.textContent = container.classList.contains('arc-reactor-sm') ? 'N' : 'N.O.V.A.';
      container.appendChild(label);
    }
  });
}

function initWaveform() {
  const wf = document.getElementById('waveform');
  for (let i = 0; i < 24; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    wf.appendChild(bar);
  }
}
let waveRAF;
function startLiveWaveform() {
  const wf = document.getElementById('waveform');
  wf.classList.add('active');
  const bars = wf.querySelectorAll('.waveform-bar');
  function draw() {
    if (!analyserNode || !isRecording) return;
    const data = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(data);
    bars.forEach((b, i) => {
      const val = data[i] || 0;
      b.style.height = Math.max(4, (val / 255) * 28) + 'px';
    });
    waveRAF = requestAnimationFrame(draw);
  }
  draw();
}
function stopLiveWaveform() {
  const wf = document.getElementById('waveform');
  wf.classList.remove('active');
  cancelAnimationFrame(waveRAF);
  wf.querySelectorAll('.waveform-bar').forEach(b => { b.style.height = '4px'; });
}
</script>
