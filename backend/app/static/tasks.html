<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04070d;--card:#0a1428;--border:rgba(0,229,255,0.1);
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,0.1);
  --amber:#ffab00;--red:#ff1744;--green:#00e676;
  --text:#e0f0ff;--text2:#5a7a9a;--text3:#2a3a50;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:rgba(4,7,13,0.95);backdrop-filter:blur(20px);
}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:16px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--cyan),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:3px}
.back-btn{
  padding:6px 16px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--text2);cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:12px;transition:all .2s;text-decoration:none;
}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan)}

.status-summary{
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);
  display:flex;gap:12px;align-items:center;
}
.count{font-weight:700}
.count.amber{color:var(--amber)}
.count.green{color:var(--green)}
.count.red{color:var(--red)}

.container{max-width:800px;margin:0 auto;padding:24px}

.section-title{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:var(--cyan);letter-spacing:3px;text-transform:uppercase;
  margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);
}

.task-card{
  padding:16px 20px;border:1px solid var(--border);border-radius:6px;
  background:var(--card);margin-bottom:10px;transition:border-color .3s;
}
.task-card:hover{border-color:rgba(0,229,255,0.25)}
.task-card.running{border-left:3px solid var(--amber)}
.task-card.queued{border-left:3px solid var(--text3)}
.task-card.completed{border-left:3px solid var(--green)}
.task-card.failed{border-left:3px solid var(--red)}
.task-card.cancelled{border-left:3px solid var(--text3);opacity:0.6}

.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.task-title{font-weight:600;font-size:15px}
.task-status{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  padding:2px 10px;border-radius:10px;text-transform:uppercase;
}
.task-status.running{background:rgba(255,171,0,0.15);color:var(--amber)}
.task-status.queued{background:rgba(90,122,154,0.15);color:var(--text2)}
.task-status.completed{background:rgba(0,230,118,0.15);color:var(--green)}
.task-status.failed{background:rgba(255,23,68,0.15);color:var(--red)}
.task-status.cancelled{background:rgba(90,122,154,0.1);color:var(--text3)}

.task-meta{
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);
  margin-bottom:8px;
}

.task-progress{margin:8px 0}
.progress-bar{
  height:4px;background:var(--border);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--amber);border-radius:2px;
  transition:width .5s ease;
}
.progress-fill.done{background:var(--green)}
.progress-text{
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);
  margin-top:4px;
}

.task-result{
  margin-top:10px;padding:12px;background:rgba(0,229,255,0.03);
  border:1px solid var(--border);border-radius:4px;
  font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text2);
  max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;
  display:none;
}
.task-result.open{display:block}

.task-actions{display:flex;gap:8px;margin-top:8px}
.btn-sm{
  padding:4px 12px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--text2);cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;transition:all .2s;
}
.btn-sm:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--text3);
  font-family:'Share Tech Mono',monospace;font-size:13px;
}

.task-error{
  margin-top:6px;font-family:'Share Tech Mono',monospace;
  font-size:11px;color:var(--red);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">NOVA</div>
      <div class="logo-sub">BACKGROUND TASKS</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="status-summary" id="statusSummary"></div>
    <a href="/" class="back-btn">BACK</a>
  </div>
</div>

<div class="container">
  <div id="runningSection">
    <div class="section-title">ACTIVE</div>
    <div id="runningList"></div>
  </div>

  <div id="completedSection">
    <div class="section-title">COMPLETED</div>
    <div id="completedList"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none">
    No background tasks yet. Ask NOVA to research something or build a project.
  </div>
</div>

<script>
const API = window.location.origin;
let evtSource = null;

async function loadTasks() {
  try {
    const r = await fetch(API + '/api/tasks');
    const tasks = await r.json();
    renderTasks(tasks);
    connectSSE();
  } catch (e) {
    console.error('Failed to load tasks:', e);
  }
}

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') node.className = v;
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
    else node.setAttribute(k, v);
  });
  if (children) {
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => { if (c) node.appendChild(c); });
  }
  return node;
}

function buildTaskCard(t) {
  const elapsed = formatElapsed(t.created_at, t.completed_at);
  const card = el('div', {className: 'task-card ' + t.status, id: 'task-' + t.id});

  // Header
  const header = el('div', {className: 'task-header'}, [
    el('span', {className: 'task-title'}, t.title),
    el('span', {className: 'task-status ' + t.status}, t.status),
  ]);
  card.appendChild(header);

  // Meta
  card.appendChild(el('div', {className: 'task-meta'}, t.type.toUpperCase() + ' \u00B7 ' + elapsed));

  // Progress bar (for active tasks)
  if (t.status === 'running' || t.status === 'queued') {
    const progress = el('div', {className: 'task-progress'});
    const bar = el('div', {className: 'progress-bar'});
    const fill = el('div', {className: 'progress-fill'});
    fill.style.width = t.progress + '%';
    bar.appendChild(fill);
    progress.appendChild(bar);
    progress.appendChild(el('div', {className: 'progress-text'}, (t.progress_text || 'Waiting...') + ' (' + t.progress + '%)'));
    card.appendChild(progress);
  }

  // Error
  if (t.error) {
    card.appendChild(el('div', {className: 'task-error'}, t.error));
  }

  // Result (hidden, toggle on click)
  let resultDiv = null;
  if (t.result) {
    resultDiv = el('div', {className: 'task-result', id: 'result-' + t.id}, t.result);
    card.appendChild(resultDiv);
  }

  // Actions
  const actions = el('div', {className: 'task-actions'});
  if (t.status === 'running' || t.status === 'queued') {
    actions.appendChild(el('button', {className: 'btn-sm danger', onClick: () => cancelTask(t.id)}, 'CANCEL'));
  }
  if (t.status === 'completed' && t.result) {
    actions.appendChild(el('button', {className: 'btn-sm', onClick: () => {
      if (resultDiv) resultDiv.classList.toggle('open');
    }}, 'VIEW RESULT'));
  }
  if (t.status !== 'running' && t.status !== 'queued') {
    actions.appendChild(el('button', {className: 'btn-sm danger', onClick: () => deleteTask(t.id)}, 'DELETE'));
  }
  card.appendChild(actions);

  return card;
}

function renderTasks(tasks) {
  const running = tasks.filter(t => t.status === 'running' || t.status === 'queued');
  const completed = tasks.filter(t => t.status === 'completed');
  const failed = tasks.filter(t => t.status === 'failed' || t.status === 'cancelled');

  const runningList = document.getElementById('runningList');
  const completedList = document.getElementById('completedList');
  const emptyState = document.getElementById('emptyState');
  const summary = document.getElementById('statusSummary');

  // Summary (safe DOM)
  summary.replaceChildren();
  if (running.length) summary.appendChild(el('span', {className: 'count amber'}, running.length + ' ACTIVE'));
  if (completed.length) summary.appendChild(el('span', {className: 'count green'}, completed.length + ' DONE'));
  if (failed.length) summary.appendChild(el('span', {className: 'count red'}, failed.length + ' FAILED'));
  if (!tasks.length) summary.appendChild(el('span', null, 'NO TASKS'));

  // Empty state
  emptyState.style.display = tasks.length ? 'none' : 'block';
  document.getElementById('runningSection').style.display = running.length ? 'block' : 'none';
  document.getElementById('completedSection').style.display = (completed.length + failed.length) ? 'block' : 'none';

  // Render running (safe DOM)
  runningList.replaceChildren();
  running.forEach(t => runningList.appendChild(buildTaskCard(t)));

  // Render completed + failed (safe DOM)
  completedList.replaceChildren();
  [...completed, ...failed].forEach(t => completedList.appendChild(buildTaskCard(t)));
}

function formatElapsed(created, completed) {
  const start = new Date(created);
  const end = completed ? new Date(completed) : new Date();
  const diff = Math.floor((end - start) / 1000);
  if (diff < 60) return diff + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ' + (diff % 60) + 's';
  return Math.floor(diff / 3600) + 'h ' + Math.floor((diff % 3600) / 60) + 'm';
}

async function cancelTask(id) {
  await fetch(API + '/api/tasks/' + id, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status: 'cancelled'}),
  });
  loadTasks();
}

async function deleteTask(id) {
  await fetch(API + '/api/tasks/' + id, {method: 'DELETE'});
  loadTasks();
}

function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(API + '/api/tasks/stream');
  evtSource.onmessage = () => loadTasks();
  evtSource.onerror = () => {
    evtSource.close();
    setTimeout(connectSSE, 5000);
  };
}

loadTasks();
</script>
</body>
</html>
